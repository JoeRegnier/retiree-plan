version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Containerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: file:/data/retiree-plan.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - db_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Containerfile
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}

volumes:
  db_data:
