---
name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where are you running RetireePlan?
      options:
        - Desktop — macOS
        - Desktop — Windows
        - Desktop — Linux
        - Self-hosted (Docker / Containers)
        - Local development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "App version or commit hash (e.g. v0.0.15 or abc1234)"
      placeholder: v0.0.15
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste relevant log output.
    validations:
      required: false
