name: Publish Container Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/container-release.yml'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: retiree-plan-api
            dockerfile: apps/api/Dockerfile
          - image_name: retiree-plan-web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
