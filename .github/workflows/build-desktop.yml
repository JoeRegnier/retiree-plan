name: Build Desktop Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional desktop release version override (e.g. v0.2.0 or 0.2.0).'
        required: false
        default: ''

# Each platform job builds, then uploads its artifacts.
# This workflow is manual-only and is intended for ad hoc installer builds.

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (DMG + ZIP)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Rollup ships platform-native binaries as optional dependencies. When the
      # package-lock.json was generated on a different OS, those binaries are absent
      # from the lockfile and npm ci skips them, causing a build failure.
      # See: https://github.com/npm/cli/issues/4828
      - name: Fix rollup platform binary (npm optional dep workaround)
        run: |
          RVER=$(node -e "process.stdout.write(require('./node_modules/rollup/package.json').version)")
          case "$(node -e 'process.stdout.write(process.platform+"-"+process.arch)')" in
            darwin-arm64) PKG="@rollup/rollup-darwin-arm64" ;;
            darwin-x64)   PKG="@rollup/rollup-darwin-x64" ;;
            win32-x64)    PKG="@rollup/rollup-win32-x64-msvc" ;;
            *)            exit 0 ;;
          esac
          test -d "node_modules/$PKG" || npm install --no-save --ignore-scripts "$PKG@$RVER"

      - name: Apply manual release version override
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: echo "DESKTOP_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Build desktop installer
        run: bash apps/desktop/scripts/build-desktop.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 14

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # windows-latest pre-installs Python and Visual Studio Build Tools,
      # which are needed by node-gyp to compile native modules (bcrypt).
      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Fix rollup platform binary (npm optional dep workaround)
        shell: bash
        run: |
          RVER=$(node -e "process.stdout.write(require('./node_modules/rollup/package.json').version)")
          case "$(node -e 'process.stdout.write(process.platform+"-"+process.arch)')" in
            darwin-arm64) PKG="@rollup/rollup-darwin-arm64" ;;
            darwin-x64)   PKG="@rollup/rollup-darwin-x64" ;;
            win32-x64)    PKG="@rollup/rollup-win32-x64-msvc" ;;
            *)            exit 0 ;;
          esac
          test -d "node_modules/$PKG" || npm install --no-save --ignore-scripts "$PKG@$RVER"

      - name: Apply manual release version override
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: echo "DESKTOP_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build desktop installer
        run: bash apps/desktop/scripts/build-desktop.sh
        shell: bash

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 14

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix rollup platform binary (npm optional dep workaround)
        run: |
          RVER=$(node -e "process.stdout.write(require('./node_modules/rollup/package.json').version)")
          case "$(node -e 'process.stdout.write(process.platform+"-"+process.arch)')" in
            darwin-arm64) PKG="@rollup/rollup-darwin-arm64" ;;
            darwin-x64)   PKG="@rollup/rollup-darwin-x64" ;;
            win32-x64)    PKG="@rollup/rollup-win32-x64-msvc" ;;
            *)            exit 0 ;;
          esac
          test -d "node_modules/$PKG" || npm install --no-save --ignore-scripts "$PKG@$RVER"

      - name: Apply manual release version override
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: echo "DESKTOP_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Build desktop installer
        run: bash apps/desktop/scripts/build-desktop.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          if-no-files-found: error
          retention-days: 14

  # ── GitHub Release (tag pushes only) ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Retiree Plan ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-artifacts/**/*
          generate_release_notes: true
