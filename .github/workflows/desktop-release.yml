# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Desktop Release

# Trigger on version tags (e.g. v1.2.3) or manually.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── Node.js 24 ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Resolve desktop release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_VERSION=$(node -e "process.stdout.write(require('./apps/desktop/package.json').version)")
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "Using desktop release version: $RELEASE_VERSION"

      # Linux: install native build toolchain for bcrypt / Prisma
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev

      # ── Install all workspace dependencies ────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # Rolldown (Vite 8's Rust-based bundler) ships platform-native binaries as
      # optional dependencies. When the package-lock.json was generated on a
      # different OS, those binaries are absent from the lockfile and npm ci
      # skips them, causing a missing native binding error at build time.
      # This step installs the correct binary for the current runner if missing.
      # See: https://github.com/npm/cli/issues/4828
      - name: Fix rolldown platform binary (npm optional dep workaround)
        shell: bash
        run: |
          RDVER=$(node -e "process.stdout.write(require('./node_modules/rolldown/package.json').version)")
          case "$(node -e 'process.stdout.write(process.platform+"-"+process.arch)')" in
            darwin-arm64) PKG="@rolldown/binding-darwin-arm64" ;;
            darwin-x64)   PKG="@rolldown/binding-darwin-x64" ;;
            win32-x64)    PKG="@rolldown/binding-win32-x64-msvc" ;;
            linux-x64)    PKG="@rolldown/binding-linux-x64-gnu" ;;
            *)            exit 0 ;;
          esac
          test -d "node_modules/$PKG" || npm install --no-save --ignore-scripts "$PKG@$RDVER"

      # Ensure Prisma model types exist before TypeScript builds (notably on Windows)
      - name: Prisma generate (pre-build)
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: "file:/tmp/dummy-build.db"

      # ── Build shared package ──────────────────────────────────────────────
      - name: Build shared
        run: npm run build -w packages/shared

      # ── Build finance-engine ──────────────────────────────────────────────
      - name: Build finance-engine
        run: npm run build -w packages/finance-engine

      # ── Build NestJS API ──────────────────────────────────────────────────
      - name: Build API
        run: npm run build -w apps/api

      # ── Build React web ───────────────────────────────────────────────────
      - name: Build web
        run: npm run build -w apps/web

      # ── Bundle API with ncc ───────────────────────────────────────────────
      - name: Bundle API (ncc)
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/server
          npx @vercel/ncc build apps/api/dist/main.js \
            --out apps/desktop/resources/server \
            --external bcrypt \
            --external @prisma/client \
            --external @github/copilot-sdk \
            -m

      # ── Write server package.json for native deps ─────────────────────────
      # @prisma/client MUST be listed here so that electron-builder v26 includes
      # it (and its full transitive dep tree: @libsql/client, libsql,
      # @libsql/<platform>, async-mutex, detect-libc …) in the packaged
      # app.  electron-builder prunes node_modules in extraResources against
      # the source package.json — packages not in the dep tree are stripped.
      # We let npm install the base @prisma/client package (which includes the
      # platform-specific libsql native binding as an optional transitive dep).
      # The generated .prisma/client/ (WASM query compiler) is NOT distributed
      # via npm; we copy it from the root node_modules in the step below.
      - name: Write server package.json
        shell: bash
        run: |
          API_BCRYPT_VER=$(node -e "process.stdout.write(require('./apps/api/package.json').dependencies.bcrypt)")
          PRISMA_VER=$(node -e "process.stdout.write(require('./apps/api/package.json').dependencies['@prisma/client'])")
          COPILOT_VER=$(node -e "process.stdout.write(require('./apps/api/package.json').dependencies['@github/copilot-sdk'] || '')")
          node -e "
            const fs = require('fs');
            const deps = { bcrypt: '$API_BCRYPT_VER', '@prisma/client': '$PRISMA_VER' };
            if ('$COPILOT_VER') deps['@github/copilot-sdk'] = '$COPILOT_VER';
            const pkg = { name: 'retiree-plan-server', version: '$RELEASE_VERSION', private: true, dependencies: deps };
            fs.writeFileSync('apps/desktop/resources/server/package.json', JSON.stringify(pkg, null, 2));
            console.log('wrote server package.json', JSON.stringify(pkg.dependencies));
          "

      # ── Install native modules into server bundle ─────────────────────────
      # Do NOT pass --no-package-lock here.  electron-builder v26 uses
      # node_modules/.package-lock.json (written by npm v7+) to identify which
      # packages are in the dep tree and therefore safe to copy into the
      # installer.  Without it, electron-builder copies nothing from
      # resources/server/node_modules and the packaged app has no node_modules.
      - name: Install server native deps
        working-directory: apps/desktop/resources/server
        run: npm install --omit=dev

      # ── Generate Prisma client for this platform ──────────────────────────
      - name: Prisma generate
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: "file:/tmp/dummy-build.db"

      # Copy the generated .prisma/client/ into the server bundle.
      # .prisma/client/ is the schema-specific generated client created by
      # `prisma generate`.  It is NOT an npm package (not in package-lock.json)
      # so electron-builder's smart-copy won't include it automatically.
      # We copy it explicitly so it sits in the same node_modules/ tree that
      # the rest of the packages are copied from.
      - name: Copy generated Prisma client into server bundle
        shell: bash
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const src = path.join('node_modules', '.prisma');
            const dst = path.join('apps/desktop/resources/server/node_modules', '.prisma');
            if (!fs.existsSync(src)) { console.error('.prisma not found in root node_modules — did prisma generate run?'); process.exit(1); }
            fs.rmSync(dst, { recursive: true, force: true });
            fs.cpSync(src, dst, { recursive: true });
            console.log('copied .prisma/client to server bundle');
          "

      # ── Rebuild native modules for Electron's Node ABI ───────────────────
      - name: Rebuild native modules for Electron
        working-directory: apps/desktop
        shell: bash
        run: |
          ELECTRON_VER=$(node -e "process.stdout.write(require('../../node_modules/electron/package.json').version)")
          npx @electron/rebuild \
            --version "$ELECTRON_VER" \
            --module-dir resources/server

      # ── Copy React build ──────────────────────────────────────────────────
      - name: Copy web build
        shell: bash
        run: |
          rm -rf apps/desktop/resources/web
          cp -r apps/web/dist apps/desktop/resources/web

      # ── Stamp template database ───────────────────────────────────────────
      - name: Create template database
        shell: bash
        run: |
          rm -f apps/desktop/resources/template.db
          # Use Node to resolve an absolute path with forward slashes so that
          # the file: URI is valid on all platforms (Windows Git Bash emits
          # POSIX-style paths like /d/a/... which SQLite cannot parse).
          TEMPLATE_ABS=$(node -e "const p=require('path').resolve('apps/desktop/resources/template.db'); process.stdout.write(p.replace(/\\\\/g,'/'))")
          DATABASE_URL="file:$TEMPLATE_ABS" \
            npx prisma db push \
              --schema=prisma/schema.prisma \
              --accept-data-loss

      # ── Compile Electron TypeScript ────────────────────────────────────────
      - name: Compile Electron main process
        working-directory: apps/desktop
        run: npm run build

      # dmg-license is an optional dep of dmg-builder; absent from the Linux-
      # generated lockfile so npm ci skips it. Install it explicitly on macOS.
      - name: Fix dmg-license (optional dep missing from Linux lockfile)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DVER=$(node -e "process.stdout.write(require('./node_modules/dmg-license/package.json').version)" 2>/dev/null || echo "1.0.11")
          test -d "node_modules/dmg-license" || npm install --no-save --ignore-scripts "dmg-license@$DVER"

      # ── Package with electron-builder ─────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        shell: bash
        run: |
          npx electron-builder --mac --x64 --publish never --config.extraMetadata.version="$RELEASE_VERSION"
          npx electron-builder --mac --arm64 --publish never --config.extraMetadata.version="$RELEASE_VERSION"
        # Code-signing (optional – leave unset to skip):
        # CSC_LINK: ${{ secrets.CSC_LINK }}
        # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        # APPLE_ID: ${{ secrets.APPLE_ID }}
        # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        shell: bash
        run: npx electron-builder --win --publish never --config.extraMetadata.version="$RELEASE_VERSION"
        # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/desktop
        shell: bash
        run: npx electron-builder --linux --publish never --config.extraMetadata.version="$RELEASE_VERSION"

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/latest*.yml
          if-no-files-found: warn
          retention-days: 30

  # ── Create / update GitHub Release ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only run for real tag pushes, not manual dispatches (unless explicitly requested).
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: write

    steps:
      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_VERSION=$(node -e "process.stdout.write(require('./apps/desktop/package.json').version)")
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "value=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Retiree Plan ${{ steps.release_version.outputs.value }}
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
